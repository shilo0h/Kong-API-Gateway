```nginx
# =========================
# GLOBAL CONTEXT
# =========================

events {
    # How many connections Nginx can handle at the same time
    # Default is usually fine, but this controls worker behavior
    worker_connections 1024;
}

http {

    # =========================
    # BASIC SECURITY RULES
    # =========================

    # 🚫 Block specific IPs (example attacker IP)
    # Replace with real IPs if needed
    deny 192.168.1.10;

    # Allow everyone else
    allow all;

    # 📏 Limit max request body size
    # Prevents huge payload attacks (e.g. 1GB file upload)
    client_max_body_size 2M;


    # =========================
    # RATE LIMITING (anti-spam)
    # =========================

    # Define a shared memory zone for tracking requests per IP
    # 10m = memory size for tracking state
    # rate = 5 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;


    server {

        listen 80;

        # Apply rate limiting to all routes in this server
        # burst=10 allows short spikes before rejecting
        limit_req zone=api_limit burst=10;


        # =========================
        # MAIN REVERSE PROXY
        # =========================

        location / {

            # Forward request to Kong (API Gateway layer)
            proxy_pass http://kong:8000;


            # =========================
            # PROXY HEADERS (important)
            # =========================

            # Preserve original request host
            proxy_set_header Host $host;

            # Pass real client IP through layers (Nginx → Kong → Spring)
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Tell backend if request was HTTP or HTTPS
            proxy_set_header X-Forwarded-Proto $scheme;


            # =========================
            # WEBSOCKET SUPPORT
            # =========================

            # Required for WebSocket upgrade (chat apps, realtime updates)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";


            # =========================
            # PERFORMANCE BEHAVIOR
            # =========================

            # Prevents slow clients from blocking backend
            proxy_request_buffering on;

            # Lets Nginx handle upstream responses efficiently
            proxy_buffering on;
        }
    }
}
```
